<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospital Guide</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <div class="header-content">
      <span class="logo" data-i18n="hospitals.title">Hospital Guide</span>
      <button class="lang-switch" id="langSwitch" onclick="toggleLanguage()">தமிழ்</button>
    </div>
  </header>

  <main class="container">
    <div class="emergency-box">
      <h2>🚨 <span data-i18n="hospitals.emergency">Emergency Contacts</span></h2>
      <p id="emergencyText">Call immediately if symptoms are severe!</p>
    </div>

    <div class="warning-box" style="margin-bottom: 20px;">
      <p id="seriousWarning">🔴 ALERT: High fever, severe vomiting, difficulty breathing, or chest pain - go to hospital immediately!</p>
    </div>

    <div class="hospital-list" id="hospitalList"></div>

    <div class="about-section" style="margin-top: 20px;">
      <h3>🏥 <span data-i18n="about.whenToSeeDoctor">When to See a Doctor</span></h3>
      <ul id="whenToSeeDoctor"></ul>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <span>🏠</span>
      <span data-i18n="nav.home">Home</span>
    </a>
    <a href="diseases.html" class="nav-item">
      <span>🏥</span>
      <span data-i18n="nav.diseases">Diseases</span>
    </a>
    <a href="hospitals.html" class="nav-item active">
      <span>🚑</span>
      <span data-i18n="nav.hospitals">Hospitals</span>
    </a>
    <a href="about.html" class="nav-item">
      <span>ℹ️</span>
      <span data-i18n="nav.about">About</span>
    </a>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script>
    function loadHospitals() {
      const lang = getLang();
      const hospitals = getHospitals();
      
      document.getElementById('seriousWarning').textContent = getWarning('serious');

      const hospitalList = document.getElementById('hospitalList');
      hospitalList.innerHTML = hospitals.map(h => `
        <div class="hospital-card">
          <div class="hospital-header">
            <span class="hospital-name">${h.name}</span>
            <span class="hospital-type">${h.type}</span>
          </div>
          <div class="hospital-services">${h.services}</div>
          <a href="tel:${h.phone}" class="btn btn-primary btn-block" style="margin-top: 12px;">
            📞 ${h.phone} - <span data-i18n="hospitals.callNow">Call Now</span>
          </a>
        </div>
      `).join('');

      const whenToSeeList = getWhenToSeeDoctor();
      document.getElementById('whenToSeeDoctor').innerHTML = whenToSeeList.map(item => `<li>${item}</li>`).join('');
    }

    document.addEventListener('languageChanged', loadHospitals);
    document.addEventListener('DOMContentLoaded', loadHospitals);
  </script>
</body>
</html>
